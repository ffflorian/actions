---
name: Create Docker Image Release
description: Create a GitHub release and publish a Docker image to GHCR
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'check', color: 'green'}

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token to create the release and publish the image.'
    required: true
  git_author:
    description: 'The author to use for the release commit.'
    required: true
  git_email:
    description: 'The email to use for the release commit.'
    required: true
  publish_files:
    description: 'Newline-separated list of files to include in the release commit.'
    required: false
    default: 'CHANGELOG.md'
  image_name:
    description: 'The name of the Docker image to publish.'
    required: false
    default: '${{ github.repository }}'

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: docker-meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 26

    - name: Create release config file
      shell: bash
      env:
        PUBLISH_FILES: ${{ inputs.publish_files }}
      run: |
        node <<'EOF'
        const {writeFileSync} = require('node:fs');

        const assets = process.env.PUBLISH_FILES.split(/\r?\n/u)
          .map((line) => line.trim())
          .filter(Boolean)
          .filter((value, index, values) => values.indexOf(value) === index);

        const config = {
          branches: ['main'],
          plugins: [
            [
              '@semantic-release/commit-analyzer',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            [
              '@semantic-release/release-notes-generator',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            '@semantic-release/changelog',
            [
              '@semantic-release/github',
              {
                releasedLabels: false,
                successCommentCondition: false,
              },
            ],
            [
              '@semantic-release/git',
              {
                assets,
                message: 'chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}',
              },
            ],
          ],
        };

        writeFileSync('.releaserc.json', `${JSON.stringify(config, null, 2)}\n`);
        EOF

    - name: Create Release
      id: semantic
      env:
        GIT_AUTHOR_NAME: ${{ inputs.git_author }}
        GIT_AUTHOR_EMAIL: ${{ inputs.git_email }}
        GIT_COMMITTER_NAME: ${{ inputs.git_author }}
        GIT_COMMITTER_EMAIL: ${{ inputs.git_email }}
      uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: docker-meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: ghcr.io/${{ inputs.image_name }}
        tags: |
          type=raw,value=latest,enable=true

    - name: Build and push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ inputs.image_name }}:${{ steps.semantic.outputs.new_release_version }}
          ghcr.io/${{ inputs.image_name }}:latest
        labels: ${{ steps.docker-meta.outputs.labels }}
