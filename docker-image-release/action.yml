---
name: Create Docker Image Release
description: Create a GitHub release and publish a Docker image to GHCR and optionally Docker Hub
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'check', color: 'green'}

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token to create the release and publish the image.'
    required: true
  DOCKER_TOKEN:
    description: 'Docker Hub token. When set, the image is also published to Docker Hub.'
    required: false
    default: ''
  git_author:
    description: 'The author to use for the release commit.'
    required: true
  git_email:
    description: 'The email to use for the release commit.'
    required: true
  publish_files:
    description: 'Newline-separated list of files to include in the release commit.'
    required: false
    default: 'CHANGELOG.md'
  image_name:
    description: 'The name of the Docker image to publish.'
    required: false
    default: '${{ github.repository }}'
  dockerfiles:
    description: 'Newline-separated list of "suffix:dockerfile" pairs for multi-image builds (e.g. "backend:backend.Dockerfile"). When set, each entry produces a separate image named "<image_name>-<suffix>". When unset, a single image is built from "Dockerfile".'
    required: false
    default: ''

outputs:
  new_release_published:
    description: 'Whether semantic-release published a new release.'
    value: ${{ steps.semantic.outputs.new_release_published }}
  new_release_version:
    description: 'Version of the new release.'
    value: ${{ steps.semantic.outputs.new_release_version }}
  new_release_major_version:
    description: 'Major version of the new release.'
    value: ${{ steps.semantic.outputs.new_release_major_version }}
  new_release_minor_version:
    description: 'Minor version of the new release.'
    value: ${{ steps.semantic.outputs.new_release_minor_version }}
  new_release_patch_version:
    description: 'Patch version of the new release.'
    value: ${{ steps.semantic.outputs.new_release_patch_version }}
  new_release_channel:
    description: 'Distribution channel of the new release.'
    value: ${{ steps.semantic.outputs.new_release_channel }}
  new_release_notes:
    description: 'Release notes for the new release.'
    value: ${{ steps.semantic.outputs.new_release_notes }}
  new_release_git_head:
    description: 'Git SHA of the new release.'
    value: ${{ steps.semantic.outputs.new_release_git_head }}
  new_release_git_tag:
    description: 'Git tag of the new release.'
    value: ${{ steps.semantic.outputs.new_release_git_tag }}
  last_release_version:
    description: 'Version of the previous release, if any.'
    value: ${{ steps.semantic.outputs.last_release_version }}
  last_release_git_head:
    description: 'Git SHA of the previous release, if any.'
    value: ${{ steps.semantic.outputs.last_release_git_head }}
  last_release_git_tag:
    description: 'Git tag of the previous release, if any.'
    value: ${{ steps.semantic.outputs.last_release_git_tag }}

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: inputs.DOCKER_TOKEN != ''
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        username: ${{ github.repository_owner }}
        password: ${{ inputs.DOCKER_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 26

    - name: Create release config file
      shell: bash
      env:
        PUBLISH_FILES: ${{ inputs.publish_files }}
      run: |
        node <<'EOF'
        const {writeFileSync} = require('node:fs');

        const assets = process.env.PUBLISH_FILES.split(/\r?\n/u)
          .map((line) => line.trim())
          .filter(Boolean)
          .filter((value, index, values) => values.indexOf(value) === index);

        const config = {
          branches: ['main'],
          plugins: [
            [
              '@semantic-release/commit-analyzer',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            [
              '@semantic-release/release-notes-generator',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            '@semantic-release/changelog',
            [
              '@semantic-release/github',
              {
                releasedLabels: false,
                successCommentCondition: false,
              },
            ],
            [
              '@semantic-release/git',
              {
                assets,
                message: 'chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}',
              },
            ],
          ],
        };

        writeFileSync('.releaserc.json', `${JSON.stringify(config, null, 2)}\n`);
        EOF

    - name: Create Release
      id: semantic
      env:
        GIT_AUTHOR_NAME: ${{ inputs.git_author }}
        GIT_AUTHOR_EMAIL: ${{ inputs.git_email }}
        GIT_COMMITTER_NAME: ${{ inputs.git_author }}
        GIT_COMMITTER_EMAIL: ${{ inputs.git_email }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90

    - name: Extract Docker metadata
      if: steps.semantic.outputs.new_release_version != ''
      id: docker-meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: ghcr.io/${{ inputs.image_name }}

    - name: Build and push Docker image(s)
      if: steps.semantic.outputs.new_release_version != ''
      shell: bash
      env:
        DOCKERFILES: ${{ inputs.dockerfiles }}
        DOCKER_TOKEN: ${{ inputs.DOCKER_TOKEN }}
        IMAGE_NAME: ${{ inputs.image_name }}
        LABELS: ${{ steps.docker-meta.outputs.labels }}
        VERSION: ${{ steps.semantic.outputs.new_release_version }}
        COMMIT: ${{ steps.semantic.outputs.new_release_git_head }}
      run: |
        build_and_push() {
          local image="$1"
          local dockerfile="$2"

          tag_args=(
            --tag "ghcr.io/${image}:${VERSION}"
            --tag "ghcr.io/${image}:latest"
          )
          if [ -n "${DOCKER_TOKEN}" ]; then
            tag_args+=(
              --tag "docker.io/${image}:${VERSION}"
              --tag "docker.io/${image}:latest"
            )
          fi

          label_args=()
          while IFS= read -r label; do
            [ -z "$label" ] && continue
            label_args+=(--label "$label")
          done <<< "${LABELS}"

          docker buildx build \
            --push \
            --file "${dockerfile}" \
            "${tag_args[@]}" \
            "${label_args[@]}" \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "COMMIT=${COMMIT}" \
            .
        }

        if [ -z "${DOCKERFILES}" ]; then
          build_and_push "${IMAGE_NAME}" "Dockerfile"
        else
          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            suffix="${entry%%:*}"
            dockerfile="${entry#*:}"
            build_and_push "${IMAGE_NAME}-${suffix}" "${dockerfile}"
          done <<< "${DOCKERFILES}"
        fi
