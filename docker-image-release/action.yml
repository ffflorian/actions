---
name: Create Docker Image Release
description: Create a GitHub release and publish a Docker image to GHCR
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'check', color: 'green'}

inputs:
  dry_run:
    description: 'If true, the action will simulate the release process without making any changes.'
    required: false
    default: 'false'
  GITHUB_TOKEN:
    description: 'GitHub token to create the release and publish the image.'
    required: true
  git_author:
    description: 'The author to use for the release commit.'
    required: true
  git_email:
    description: 'The email to use for the release commit.'
    required: true
  publish_files:
    description: 'Newline-separated list of files to include in the release commit.'
    required: false
    default: 'CHANGELOG.md'

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: docker-meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 26

    - name: Build TypeScript actions
      shell: bash
      run: |
        for dir in force-release hugo-theme-update yarn-update; do
          (cd "$dir" && yarn install --frozen-lockfile && yarn build)
        done

    - name: Create release config file
      shell: bash
      env:
        PUBLISH_FILES: ${{ inputs.publish_files }}
      run: |
        node <<'NODE'
        const {writeFileSync} = require('node:fs');

        const assets = process.env.PUBLISH_FILES.split(/\r?\n/u)
          .map((line) => line.trim())
          .filter(Boolean)
          .filter((value, index, values) => values.indexOf(value) === index);

        const config = {
          branches: ['main'],
          plugins: [
            [
              '@semantic-release/commit-analyzer',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            [
              '@semantic-release/release-notes-generator',
              {
                preset: 'angular',
                parserOpts: {
                  noteKeywords: ['BREAKING CHANGE', 'BREAKING CHANGES', 'BREAKING'],
                },
              },
            ],
            '@semantic-release/changelog',
            [
              '@semantic-release/github',
              {
                releasedLabels: false,
                successCommentCondition: false,
              },
            ],
            [
              '@semantic-release/git',
              {
                assets,
                message: 'chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}',
              },
            ],
          ],
        };

        writeFileSync('.releaserc.json', `${JSON.stringify(config, null, 2)}\n`);
        NODE

    - name: Create Release
      id: semantic
      env:
        GIT_AUTHOR_NAME: ${{ inputs.git_author }}
        GIT_AUTHOR_EMAIL: ${{ inputs.git_email }}
        GIT_COMMITTER_NAME: ${{ inputs.git_author }}
        GIT_COMMITTER_EMAIL: ${{ inputs.git_email }}
      uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
      with:
        dry_run: ${{ inputs.dry_run }}

    - name: Setup Docker Buildx
      if: steps.semantic.outputs.new_release_published == 'true' && inputs.dry_run != 'true'
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

    - name: Publish Docker image (dry run)
      if: steps.semantic.outputs.new_release_published == 'true' && inputs.dry_run == 'true'
      shell: bash
      run: |
        echo "Dry run enabled, skipping docker push."
        echo "${{ steps.docker-meta.outputs.tags }}"
        echo "ghcr.io/${{ github.repository }}:${{ steps.semantic.outputs.new_release_version }}"

    - name: Publish Docker image
      if: steps.semantic.outputs.new_release_published == 'true' && inputs.dry_run != 'true'
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
      with:
        context: .
        push: true
        tags: |
          ${{ steps.docker-meta.outputs.tags }}
          ghcr.io/${{ github.repository }}:${{ steps.semantic.outputs.new_release_version }}
        labels: ${{ steps.docker-meta.outputs.labels }}
