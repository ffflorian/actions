---
name: Hugo Theme Update
description: Update Hugo modules every x days and create a pull request
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'refresh-cw', color: 'green'}

inputs:
  git_authorship:
    description: 'The authorship to use for the commit. Format: "Name <email>".'
    required: true
  github_token:
    description: 'GitHub token with contents: write and pull-requests: write permissions.'
    required: true
  cooldown_days:
    description: 'Minimum days between update PRs. Set to 0 or leave unset to disable.'
    required: false
    default: '0'
  hugo_version:
    description: 'The Hugo version to use.'
    required: false
    default: 'latest'

outputs:
  pr_number:
    description: 'The number of the created pull request, if any.'
    value: ${{ steps.hugo-update.outputs.pr_number }}
  pr_url:
    description: 'The URL of the created pull request, if any.'
    value: ${{ steps.hugo-update.outputs.pr_url }}

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f
      with:
        hugo-version: ${{ inputs.hugo_version }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: 24

    - name: Update Hugo modules
      id: hugo-update
      shell: bash
      env:
        INPUT_GIT_AUTHORSHIP: ${{ inputs.git_authorship }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_COOLDOWN_DAYS: ${{ inputs.cooldown_days }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: node "${{ github.action_path }}/dist/index.js"
