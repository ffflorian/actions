---
name: Check for yarn updates
description: Check for yarn updates and create a pull request if updates are available
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'fast-forward', color: 'yellow'}

inputs:
  git_authorship:
    description: 'The authorship to use for the commit. Format: "Name <email>".'
    required: true
  release_cooldown_days:
    description: 'How many days a yarn release must be old before it is eligible for an update. Set to 0 or leave unset to disable.'
    required: false
    default: '0'

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: 24

    - name: Update yarn
      id: update-yarn
      env:
        RELEASE_COOLDOWN_DAYS: ${{ inputs.release_cooldown_days }}
      shell: bash
      run: |
        UPDATED=false
        TARGET_VERSION=''
        FOUND_YARN_DIR=false
        COOLDOWN="${RELEASE_COOLDOWN_DAYS:-0}"

        if ! [[ "${COOLDOWN}" =~ ^[0-9]+$ ]]; then
          echo "::error::release_cooldown_days must be a non-negative integer, got: '${COOLDOWN}'."
          exit 1
        fi

        while IFS= read -r -d '' YARN_DIR; do
          FOUND_YARN_DIR=true
          PROJECT_DIR=$(dirname "${YARN_DIR}")

          echo "Checking yarn in ${PROJECT_DIR} ..."
          pushd "${PROJECT_DIR}" > /dev/null

          OLD_VERSION=$(yarn --version)

          if [ "${COOLDOWN}" -gt 0 ]; then
            CANDIDATE=$( \
              (curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/yarnpkg/berry/releases?per_page=100" \
                2>/dev/null || echo '[]') \
              | python3 -c "import sys,json; from datetime import datetime,timezone,timedelta; data=json.load(sys.stdin); releases=data if isinstance(data,list) else []; cutoff=datetime.now(timezone.utc)-timedelta(days=${COOLDOWN}); result=next((r['tag_name'][len('@yarnpkg/cli/'):] for r in releases if r.get('tag_name','').startswith('@yarnpkg/cli/') and not r.get('prerelease') and r.get('published_at') and datetime.fromisoformat(r['published_at'].replace('Z','+00:00'))<=cutoff),None); print(result or '')")
            if [ -z "${CANDIDATE}" ]; then
              echo "No yarn release is older than ${COOLDOWN} days. Skipping update."
              popd > /dev/null
              continue
            fi
            echo "Targeting yarn ${CANDIDATE} (latest release at least ${COOLDOWN} day(s) old)."
            if python3 -c "
import sys
def v(s): return tuple(int(x) for x in s.split('-')[0].split('.'))
if v('${OLD_VERSION}') >= v('${CANDIDATE}'): sys.exit(0)
sys.exit(1)
"; then
              echo "yarn ${OLD_VERSION} in ${PROJECT_DIR} is already at or newer than candidate ${CANDIDATE}. Skipping."
              popd > /dev/null
              continue
            fi
            yarn set version "${CANDIDATE}"
          else
            yarn set version stable
          fi

          NEW_VERSION=$(yarn --version)

          if [ "${OLD_VERSION}" = "${NEW_VERSION}" ]; then
            echo "yarn is already up to date in ${PROJECT_DIR}."
          else
            echo "yarn updated from ${OLD_VERSION} to ${NEW_VERSION} in ${PROJECT_DIR}."
            echo "Running yarn install to update lockfile in ${PROJECT_DIR} ..."
            yarn install --mode=update-lockfile
            UPDATED=true
            if [ -z "${TARGET_VERSION}" ]; then
              TARGET_VERSION="${NEW_VERSION}"
            elif [ "${TARGET_VERSION}" != "${NEW_VERSION}" ]; then
              echo "::error::Expected all yarn installations to update to the same stable version, but got ${TARGET_VERSION} and ${NEW_VERSION}."
              exit 1
            fi
          fi

          popd > /dev/null
        done < <(find . -maxdepth 5 -type d -name .yarn -not -path './.git/*' -not -path '*/node_modules/*' -print0)

        if [ "${FOUND_YARN_DIR}" = false ]; then
          echo "No .yarn directories found."
        fi

        if [ "${UPDATED}" = true ]; then
          echo "YARN_VERSION=${TARGET_VERSION}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Create Pull Request
      if: steps.update-yarn.outputs.YARN_VERSION != ''
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
      with:
        author: ${{ inputs.git_authorship }}
        committer: ${{ inputs.git_authorship }}
        base: main
        body: |
          This PR updates all yarn installations in this repository to version **${{ steps.update-yarn.outputs.YARN_VERSION }}**.

          See the [release notes](https://github.com/yarnpkg/berry/releases/tag/%40yarnpkg%2Fcli%2F${{ steps.update-yarn.outputs.YARN_VERSION }}) for more details.
        branch: 'chore/deps/yarn-${{ steps.update-yarn.outputs.YARN_VERSION }}'
        commit-message: 'chore(deps): bump yarn to version ${{ steps.update-yarn.outputs.YARN_VERSION }}'
        title: 'chore(deps): bump yarn to version ${{ steps.update-yarn.outputs.YARN_VERSION }}'
