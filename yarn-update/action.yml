---
name: Check for yarn updates
description: Check for yarn updates and create a pull request if updates are available
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'fast-forward', color: 'yellow'}

inputs:
  git_authorship:
    description: 'The authorship to use for the commit. Format: "Name <email>".'
    required: true

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: 24

    - name: Update yarn
      id: update-yarn
      shell: bash
      run: |
        UPDATED=false
        UPDATED_VERSIONS=''
        YARN_VERSION_REF=''
        YARN_VERSIONS=''
        FOUND_YARN_DIR=false

        while IFS= read -r -d '' YARN_DIR; do
          FOUND_YARN_DIR=true
          PROJECT_DIR=$(dirname "${YARN_DIR}")

          echo "Checking yarn in ${PROJECT_DIR} ..."
          pushd "${PROJECT_DIR}" > /dev/null

          OLD_VERSION=$(yarn --version)
          yarn set version stable
          NEW_VERSION=$(yarn --version)

          if [ "${OLD_VERSION}" = "${NEW_VERSION}" ]; then
            echo "yarn is already up to date in ${PROJECT_DIR}."
          else
            echo "yarn updated from ${OLD_VERSION} to ${NEW_VERSION} in ${PROJECT_DIR}."
            echo "Running yarn install to update lockfile in ${PROJECT_DIR} ..."
            yarn install --mode=update-lockfile
            UPDATED=true
            UPDATED_VERSIONS="${UPDATED_VERSIONS}
${NEW_VERSION}"
          fi

          popd > /dev/null
        done < <(find . -type d -name .yarn -not -path './.git/*' -print0)

        if [ "${FOUND_YARN_DIR}" = false ]; then
          echo "No .yarn directories found."
        fi

        if [ "${UPDATED}" = true ]; then
          YARN_VERSIONS=$(printf '%s\n' "${UPDATED_VERSIONS}" | sed '/^$/d' | sort -u | paste -sd ', ' -)
          VERSION_COUNT=$(printf '%s\n' "${UPDATED_VERSIONS}" | sed '/^$/d' | sort -u | wc -l | tr -d '[:space:]')

          if [ "${VERSION_COUNT}" = '1' ]; then
            YARN_VERSION_REF="${YARN_VERSIONS}"
          else
            YARN_VERSION_REF='multiple-versions'
          fi

          echo "YARN_VERSIONS=${YARN_VERSIONS}" >> $GITHUB_OUTPUT
          echo "YARN_VERSION_REF=${YARN_VERSION_REF}" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.update-yarn.outputs.YARN_VERSION_REF != ''
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
      with:
        author: ${{ inputs.git_authorship }}
        committer: ${{ inputs.git_authorship }}
        base: main
        body: |
          This PR updates all Yarn installations in this repository to version(s) **${{ steps.update-yarn.outputs.YARN_VERSIONS }}**.

          See the [release notes](https://github.com/yarnpkg/berry/releases) for more details.
        branch: 'chore/deps/yarn-${{ steps.update-yarn.outputs.YARN_VERSION_REF }}'
        commit-message: 'chore(deps): bump yarn to version(s) ${{ steps.update-yarn.outputs.YARN_VERSIONS }}'
        title: 'chore(deps): bump yarn to version(s) ${{ steps.update-yarn.outputs.YARN_VERSIONS }}'
