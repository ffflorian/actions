---
name: Force Release
description: Force a release by committing to the repository
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'git-commit', color: 'blue'}

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token used to push the release commit.'
    required: true
  commit_message:
    description: 'The commit message to use for the empty release commit.'
    required: false
    default: 'fix: Force release'
  git_authorship:
    description: 'The authorship to use for the commit. Format: "Name <email>".'
    required: true
  packages:
    description: 'Space-separated list of package directories to touch for multi-semantic-release. When set, a .force-release file is updated in each directory so multi-semantic-release detects per-package changes.'
    required: false
    default: ''

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        token: ${{ inputs.GITHUB_TOKEN }}

    - name: Force release
      shell: bash
      env:
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        GIT_AUTHORSHIP: ${{ inputs.git_authorship }}
        PACKAGES: ${{ inputs.packages }}
      run: |
        if ! echo "${GIT_AUTHORSHIP}" | grep -qE '^.+ <[^>]+>$'; then
          echo "Error: git_authorship must be in the format 'Name <email>'."
          exit 1
        fi

        AUTHOR_NAME="$(echo "${GIT_AUTHORSHIP}" | sed 's/ <.*//')"
        AUTHOR_EMAIL="$(echo "${GIT_AUTHORSHIP}" | sed 's/.*<\(.*\)>/\1/')"

        git config user.name "${AUTHOR_NAME}"
        git config user.email "${AUTHOR_EMAIL}"

        if [ -n "${PACKAGES}" ]; then
          IFS=' ' read -ra pkg_list <<< "${PACKAGES}"
          for pkg in "${pkg_list[@]}"; do
            if [ ! -d "${pkg}" ]; then
              echo "Error: package directory '${pkg}' does not exist."
              exit 1
            fi
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${pkg}/.force-release"
            git add "${pkg}/.force-release"
          done
          git commit -m "${COMMIT_MESSAGE}"
        else
          git commit --allow-empty -m "${COMMIT_MESSAGE}"
        fi

        git push origin HEAD
