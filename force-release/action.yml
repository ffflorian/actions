---
name: Force Release
description: Update semantic-release release rules and push a release commit
author: 'Florian Imdahl <git@ffflorian.de>'
branding: {icon: 'git-commit', color: 'blue'}

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token used to check out the repository and push the release commit.'
    required: true
  commit_message:
    description: 'The commit message to use for the release commit.'
    required: false
    default: 'chore: Force release'
  git_authorship:
    description: 'The authorship to use for the commit. Format: "Name <email>".'
    required: true

runs:
  using: composite

  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        token: ${{ inputs.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 26

    - name: Force release
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
        INPUT_GIT_AUTHORSHIP: ${{ inputs.git_authorship }}
      run: node "${{ github.action_path }}/dist/index.js"
