updates:
  - assignees:
      - ffflorian
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 5
      exclude:
        - ffflorian/*
    directory: /
    open-pull-requests-limit: 99
    package-ecosystem: github-actions
    schedule:
      interval: weekly
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
      prefix-development: chore(deps-dev)
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
    directories:
      - /coolify-deploy
      - /force-release
      - /hugo-theme-update
      - /yarn-update
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 99
    package-ecosystem: npm
    schedule:
      interval: weekly
version: 2
