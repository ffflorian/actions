version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    cooldown:
      default-days: 5
      exclude:
        - 'ffflorian/*'
  - package-ecosystem: 'npm'
    directory: '/hugo-theme-update'
    schedule:
      interval: monthly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    ignore:
      - dependency-name: '@types/node'
        versions: ['>=25']
  - package-ecosystem: 'npm'
    directory: '/yarn-update'
    schedule:
      interval: monthly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    ignore:
      - dependency-name: '@types/node'
        versions: ['>=25']
