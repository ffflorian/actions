---
name: Lint and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}
jobs:
  lint_publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Run prettier
        run: |
          yarn init -y
          yarn add -D -E @ffflorian/prettier-config@0.7.0 prettier@3.8.1
          npx --no prettier -- --list-different .

      - name: Build TypeScript actions
        run: |
          for dir in hugo-theme-update yarn-update; do
            (cd "$dir" && yarn install --frozen-lockfile && yarn build)
          done

      - name: Publish all actions
        if: github.event_name != 'pull_request'
        uses: ./github-action-release/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          git_author: Florian Imdahl
          git_email: git@ffflorian.de

  hugo_theme_update_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hugo-theme-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run prettier
        run: yarn lint

      - name: Run tests
        run: yarn test

  yarn_update_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yarn-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting with Prettier
        run: yarn format:check

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test
