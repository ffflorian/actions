---
name: Lint and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  lint_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: yarn

      - name: Run prettier
        run: |
          yarn init -y
          yarn add -D -E @ffflorian/prettier-config prettier json
          npx json -I -f package.json -e "this.prettier='@ffflorian/prettier-config'"
          npx prettier --list-different .

      - name: Publish all actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          git_author: Florian Imdahl
          git_email: git@ffflorian.de
        uses: ./github-action-release/
