---
name: yarn-update CI

on:
  push:
    branches: [main]
    paths:
      - 'yarn-update/**'
  pull_request:
    branches: [main]
    paths:
      - 'yarn-update/**'

permissions: {}

jobs:
  lint-and-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yarn-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting with Prettier
        run: yarn format:check

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test
