---
name: hugo-theme-update

on:
  push:
    branches: [main]
    paths:
      - hugo-theme-update/**
  pull_request:
    branches: [main]
    paths:
      - hugo-theme-update/**

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: hugo-theme-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run prettier
        run: yarn lint

      - name: Run tests
        run: yarn test
