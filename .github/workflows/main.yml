name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  hugo_theme_update_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hugo-theme-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting with Prettier
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test

  coolify_deploy_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coolify-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting with Prettier
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test

  force_release_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: force-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting with Prettier
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test

  yarn_update_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yarn-update
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting with Prettier
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test

  build_publish:
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    needs:
      - hugo_theme_update_test
      - coolify_deploy_test
      - force_release_test
      - yarn_update_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26

      - name: Build TypeScript actions
        run: |
          for dir in coolify-deploy force-release hugo-theme-update yarn-update; do
            (cd "$dir" && yarn install --immutable && yarn build)
          done

      - name: Publish all actions
        if: github.event_name != 'pull_request'
        uses: ./github-action-release/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          git_author: Florian Imdahl
          git_email: git@ffflorian.de
          publish_files: |
            CHANGELOG.md
            coolify-deploy/dist/index.js
            force-release/dist/index.js
            hugo-theme-update/dist/index.js
            yarn-update/dist/index.js
